name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Spotless Check
        run: ./gradlew --no-daemon spotlessCheck

      - name: Detekt
        run: ./gradlew --no-daemon detekt

      - name: Tests
        run: ./gradlew --no-daemon test

      - name: Android Compile
        run: ./gradlew --no-daemon :androidApp:compileDebugKotlin

