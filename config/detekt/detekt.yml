build:
  maxIssues: 0
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: true

processors:
  active: true

console-reports:
  active: true
  exclude:
    - ProjectStatisticsReport

naming:
  FunctionNaming:
    active: true
    ignoreAnnotated:
      - Composable
      - Preview
      - Test
      - BeforeTest
      - AfterTest

complexity:
  LongMethod:
    active: true
    threshold: 80
  LongParameterList:
    active: true
    functionThreshold: 8
    constructorThreshold: 10
    ignoreDefaultParameters: true
    ignoreDataClasses: true
    ignoreAnnotated:
      - Composable
  CyclomaticComplexMethod:
    active: true
    threshold: 20
  NestedBlockDepth:
    active: true
    threshold: 4
  LargeClass:
    active: true
    threshold: 600

style:
  ReturnCount:
    active: true
    max: 4
  ThrowsCount:
    active: true
    max: 2
